<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gammon</title>
</head>
<body>
<main>
    <div class="dropzone">
        <div class="dz-message">
            <div>
                <p>Drop your</p>
                <p class="large">Google My Maps KML or KMZ</p>
                <p>here and I will convert it to an</p>
                <i class="fa-regular fa-circle-down icon"></i>
                <p class="large">Organic Maps KML</p>
                <p>(and MAPS.ME)</p>
            </div>
        </div>
    </div>
    <div id="error-block">
        <p class="large">Error occurred</p>
        <p id="error-message"></p>
    </div>
</main>
</body>
</html>
